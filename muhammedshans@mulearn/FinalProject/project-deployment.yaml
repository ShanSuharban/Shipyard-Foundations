apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-nginx-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: web-app

  template:
    metadata:
      labels:
        app: web-app

    spec:
      containers:
        - name: nginx
          image: nginx-app
          imagePullPolicy: Never

          ports:
            - containerPort: 80

          env:
            - name: STUDENT_NAME
              value: "Muhammed Shan S"